<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recipe Scanner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #0a0a0a;
      --surface:       #141414;
      --surface-2:     #1c1c1c;
      --border:        #272727;
      --border-active: #404040;
      --accent:        #00bfa6;
      --accent-dim:    rgba(0, 191, 166, 0.12);
      --text:          #f0f0f0;
      --text-muted:    #777;
      --error:         #f87171;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      gap: 1rem;
    }

    .wordmark {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.25rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .card-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .camera-icon {
      width: 52px;
      height: 52px;
      background: var(--accent-dim);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.55;
      max-width: 280px;
    }

    .drop-zone {
      border: 1.5px dashed var(--border-active);
      border-radius: 14px;
      padding: 1.75rem 1.25rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.18s ease, background 0.18s ease;
      position: relative;
      background: var(--surface-2);
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-prompt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      pointer-events: none;
    }

    .upload-icon {
      font-size: 1.6rem;
      opacity: 0.5;
      margin-bottom: 0.15rem;
    }

    .drop-primary {
      font-size: 0.88rem;
      color: var(--text);
    }

    .drop-primary strong {
      color: var(--accent);
      font-weight: 600;
    }

    .drop-secondary {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .file-selected {
      display: none;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: var(--accent);
      margin-top: 0.6rem;
      justify-content: center;
      pointer-events: none;
      word-break: break-all;
    }

    .file-selected.visible { display: flex; }

    .btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 0.82rem 1.5rem;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease, opacity 0.15s ease;
    }

    .btn:hover:not(:disabled) { background: #00a892; }
    .btn:active:not(:disabled) { transform: scale(0.985); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .status-row {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      min-height: 1.25rem;
    }

    .status-row.loading {
      display: flex;
      color: var(--text-muted);
    }

    .status-row.error {
      display: flex;
      color: var(--error);
    }

    .spinner {
      width: 15px;
      height: 15px;
      border: 2px solid #333;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="wordmark">Recipe Scanner</div>

  <div class="card">
    <div class="card-header">
      <div class="camera-icon">📸</div>
      <h1>Scan a Recipe</h1>
      <p class="subtitle">Upload a photo of any recipe and get a clean, importable page instantly.</p>
    </div>

    <div class="drop-zone" id="dropZone">
      <input type="file" accept="image/*" id="fileInput">
      <div class="drop-prompt">
        <span class="upload-icon">⬆️</span>
        <p class="drop-primary"><strong>Choose a photo</strong> or drag it here</p>
        <p class="drop-secondary">JPG · PNG · HEIC &nbsp;·&nbsp; Max 10 MB</p>
      </div>
      <div class="file-selected" id="fileSelected">
        <span>📄</span><span id="fileName"></span>
      </div>
    </div>

    <button class="btn" id="convertBtn" onclick="uploadImage()">Convert Recipe</button>

    <div class="status-row" id="statusRow"></div>
  </div>

  <p class="footer-note">Powered by GPT-4o vision</p>

  <script>
    const dropZone    = document.getElementById('dropZone');
    const fileInput   = document.getElementById('fileInput');
    const fileNameEl  = document.getElementById('fileName');
    const fileSelected = document.getElementById('fileSelected');
    const statusRow   = document.getElementById('statusRow');
    const convertBtn  = document.getElementById('convertBtn');

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) showFile(fileInput.files[0].name);
    });

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) { fileInput.files = e.dataTransfer.files; showFile(file.name); }
    });

    function showFile(name) {
      fileNameEl.textContent = name;
      fileSelected.classList.add('visible');
    }

    function setStatus(type, message) {
      statusRow.className = `status-row ${type}`;
      if (type === 'loading') {
        statusRow.innerHTML = `<div class="spinner"></div><span>${message}</span>`;
      } else {
        statusRow.textContent = message;
      }
    }

    function clearStatus() {
      statusRow.className = 'status-row';
      statusRow.innerHTML = '';
    }

    async function uploadImage() {
      const file = fileInput.files[0];
      clearStatus();

      if (!file)                          return setStatus('error', 'Please select an image file.');
      if (!file.type.startsWith('image/')) return setStatus('error', 'Only image files are allowed.');
      if (file.size > 10 * 1024 * 1024)   return setStatus('error', 'Image is too large. Max 10 MB.');

      convertBtn.disabled = true;
      setStatus('loading', 'Processing your recipe…');

      try {
        const resizedBase64 = await resizeImage(file, 1000);

        const response = await fetchWithTimeout('https://recipe-test.onrender.com/api/process', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: resizedBase64 })
        }, 90000);

        if (!response.ok) throw new Error('Server error');

        const data = await response.json();
        if (data.htmlUrl) {
          window.location.href = data.htmlUrl;
        } else {
          throw new Error('Invalid response');
        }
      } catch (error) {
        convertBtn.disabled = false;
        if (error.name === 'AbortError') {
          setStatus('error', 'Request timed out. The server might be busy — please try again.');
        } else {
          setStatus('error', 'Something went wrong. Please try again.');
        }
        console.error('Upload error:', error);
      }
    }

    function resizeImage(file, maxWidth) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = event => {
          const img = new Image();
          img.onload = () => {
            const scale = maxWidth / img.width;
            const canvas = document.createElement('canvas');
            canvas.width = maxWidth;
            canvas.height = img.height * scale;
            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
          };
          img.onerror = reject;
          img.src = event.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function fetchWithTimeout(resource, options = {}, timeout = 25000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), timeout);
      try {
        return await fetch(resource, { ...options, signal: controller.signal });
      } finally {
        clearTimeout(id);
      }
    }
  </script>
</body>
</html>
